services:
  codex-broker:
    build:
      context: ..
      args:
        CODEX_VERSION: "0.144.3"
    image: codex-broker:local
    environment:
      CODEX_BROKER_ALLOWED_WORKSPACE_ROOTS: "/workspaces:/host-data"
      CODEX_BROKER_ALLOWED_TOOL_COMMANDS: "python,node"
      CODEX_BROKER_ALLOWED_HOSTED_TOOL_URL_PREFIXES: "http://app:3000,http://host.docker.internal,http://127.0.0.1"
      CODEX_HOST_TOOL_KEY: "${CODEX_HOST_TOOL_KEY:-}"
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - codex-broker-data:/data
      - ../..:/workspaces/app:rw
      - job-data:/host-data/jobs:rw
      - ./bundles:/bundles:ro
    secrets:
      - codex_broker_key
    restart: unless-stopped

volumes:
  codex-broker-data:
  job-data:

secrets:
  codex_broker_key:
    file: ./secrets/codex_broker_key.example
